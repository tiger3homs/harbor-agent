<svg xmlns="http://www.w3.org/2000/svg" width="280" height="80" viewBox="0 0 280 80" fill="none">
  <!-- Monochrome version (Black) -->
  <g stroke="#000000" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Anchor Ring -->
    <circle cx="34" cy="40" r="15"/>
    
    <!-- Anchor Shaft -->
    <line x1="34" y1="25" x2="34" y2="58"/>
    
    <!-- Anchor Arms -->
    <path d="M21 50 Q34 62 47 50"/>
    
    <!-- Swarm Nodes -->
    <circle cx="54" cy="24" r="3" fill="#000000"/>
    <circle cx="62" cy="40" r="3" fill="#000000"/>
    <circle cx="52" cy="55" r="3" fill="#000000"/>
    
    <!-- Swarm Connections -->
    <line x1="47" y1="30" x2="54" y2="24" stroke-opacity="0.6"/>
    <line x1="47" y1="40" x2="62" y2="40" stroke-opacity="0.6"/>
    <line x1="47" y1="50" x2="52" y2="55" stroke-opacity="0.6"/>
  </g>
  
  <!-- Text -->
  <text x="82" y="50" 
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
        font-size="36" font-weight="700" fill="#000000" letter-spacing="-0.5">Harbor</text>
</svg>