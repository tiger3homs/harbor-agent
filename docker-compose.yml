version: '3.8'

services:
  structured-clause-agent:
    build: .
    ports:
      - "37701:37701"
    environment:
      - PORT=37701
      - DB_PATH=/data/agent.db
    volumes:
      - structured-agent-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:37701/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  structured-agent-data: