name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.3.0)'
        required: true
        default: '0.3.0'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: false
          tag_name: v${{ github.event.inputs.version || github.ref_name }}
          body: |
            ## Harbor v${{ github.event.inputs.version || github.ref_name }}
            
            The Skills Operating System for Claude Code.
            
            ### Highlights
            - Automatic Skill Detection & Injection
            - Subagent Swarm Orchestration
            - Ruflo-style Meta-Harness Security
            - 90%+ Token Reduction
            
            See full release notes in [CHANGELOG.md](https://github.com/tiger3homs/harbor/blob/main/CHANGELOG.md)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}